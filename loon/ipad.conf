[Rule]
# > ChinaMedia 中国流媒体服务
DOMAIN,cache.video.iqiyi.com,DIRECT
# > 国内游戏直连
DOMAIN-SUFFIX,kurogame.com,DIRECT
DOMAIN-SUFFIX,kurogames.com,DIRECT
DOMAIN-SUFFIX,kurobbs.com,DIRECT
DOMAIN-SUFFIX,aki-game.com,DIRECT
DOMAIN-SUFFIX,aki-game2.com,DIRECT
DOMAIN-SUFFIX,kurogames-global.com,DIRECT
DOMAIN-SUFFIX,kurogame.xyz,DIRECT
# > 自定义直连补充
DOMAIN-SUFFIX,servicewechat.com,DIRECT
DOMAIN-SUFFIX,wxgateway.com,DIRECT
DOMAIN-SUFFIX,videocc.net,DIRECT
DOMAIN-SUFFIX,ocsp.digicert.com,DIRECT
DOMAIN-SUFFIX,cacerts.digicert.com,DIRECT
DOMAIN-SUFFIX,crl3.digicert.com,DIRECT
# > Other
DOMAIN-KEYWORD,hanime,Opt
# 进程级识别(yuumimi 远程订阅不含 USER-AGENT,补在本地)
USER-AGENT,"YouTube*",YouTube
USER-AGENT,"YouTubeMusic*",YouTube
USER-AGENT,"com.google.ios.youtube*",YouTube
USER-AGENT,"com.google.ios.youtubemusic*",YouTube
# > CN IP 解析兜底（仅在域名规则未命中时触发）
GEOIP,CN,DIRECT
FINAL,Final

