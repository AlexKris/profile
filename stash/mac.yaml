# ==================== 锚点配置 ====================
BaseProvider: &BaseProvider
  type: http
  interval: 86400
  proxy: Proxy
  health-check:
    enable: true
    url: 'http://1.1.1.1/generate_204'
    interval: 300
    timeout: 5000
    lazy: true

BaseSelect: &BaseSelect {type: select, use: [Sub1]}

FilterHK: &FilterHK '(?=.*(?:🇭🇰|HK|Hong))'
FilterTW: &FilterTW '(?=.*(?:🇨🇳|TW|Tai))'
FilterJP: &FilterJP '(?=.*(?:🇯🇵|JP|Japan))'
FilterSG: &FilterSG '(?=.*(?:🇸🇬|SG|Sing))'
FilterUS: &FilterUS '(?=.*(?:🇺🇸|US|USA))'
FilterDE: &FilterDE '(?=.*(?:🇩🇪|DE|DEU))'

FilterHKJPWide: &FilterHKJPWide '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterTelegram: &FilterTelegram '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterGlobalMedia: &FilterGlobalMedia '(?=.*(?:🇭🇰|🇨🇳|🇸🇬|HK|TW|SG|Hong|Tai|Sing))'
FilterGlobalEmby: &FilterGlobalEmby '(?=.*(?:🇭🇰|🇯🇵|🇸🇬|HK|JP|SG))'
FilterRFCEmby: &FilterRFCEmby '(?=.*(?:🇭🇰|🇯🇵|🇸🇬|HK|JP|SG))(?=.*(?:RFC|Jinx))'
FilterAIGC: &FilterAIGC '(?=.*(?:🇨🇳|🇯🇵|🇸🇬|🇺🇸|🇬🇧|TW|JP|SG|US|英国))(?=.*(?:SoftBank|Nuro|Ucom|IIJ|Starlink|ATT|Hawaii|家宽))'
FilterGoogle: &FilterGoogle '(?=.*(?:🇺🇸|US|USA))'
FilterSpeedtest: &FilterSpeedtest '(?=.*(?:🇭🇰|🇨🇳|🇯🇵|🇸🇬|HK|TW|JP|SG))'

# 规则集模板（Stash 原生 *-text behavior，解析更高效）
BehaviorDN: &BehaviorDN {type: http, behavior: domain-text, interval: 86400}

BehaviorCL: &BehaviorCL {type: http, behavior: classical, format: text, interval: 86400}

BehaviorIP: &BehaviorIP {type: http, behavior: classical, format: text, interval: 86400}

BehaviorIPCIDRText: &BehaviorIPCIDRText {type: http, behavior: ipcidr, format: text, interval: 86400}

# Stash 3.1.1+ 支持 mrs 格式（仅 domain / ipcidr）
BehaviorMrsDN: &BehaviorMrsDN {type: http, behavior: domain, format: mrs, interval: 86400}

BehaviorMrsIP: &BehaviorMrsIP {type: http, behavior: ipcidr, format: mrs, interval: 86400}

# ==================== 代理提供者 ====================
proxy-providers:
  Sub1:
    <<: *BaseProvider
    url: '订阅地址'
    path: ./proxy_providers/sub1.yaml

# ==================== 核心配置 ====================
mode: rule
port: 7890
socks-port: 7891
mixed-port: 7893
ipv6: false
allow-lan: true
log-level: warning

# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443], override-destination: true}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# ==================== DNS 配置 ====================
dns:
  enable: true
  skip-cert-verify: true
  use-system-hosts: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.m2m"
    - injections.adguard.org
    - local.adguard.org
    - "+.bogon"
    - "+.local"
    - "+.lan"
    - "+.internal"
    - "+.localdomain"
    - home.arpa
    - 127.0.0.1.sslip.io
    - 127.atlas.skk.moe
    - dns.msftncsi.com
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.turn.twilio.com"
    - "*.stun.twilio.com"
    - stun.syncthing.net
    - "stun.*"
    - lancache.steamcontent.com
    - "+.ea.com"
    - "+.eaassets-a.akamaihd.net"
    - "+.battle.net"
    - "+.battlenet.com"
    - "+.battlenet.com.cn"
    - "+.blizzard.com"
    - "+.blzstatic.cn"
    - "+.steamserver.net"
    - "+.steampowered.com"
    - "+.steamcontent.com"
    - "+.xboxlive.com"
    - stun.l.google.com
    - "+.mihoyo.com"
    - "+.yuanshen.com"
    - "+.bh3.com"
    - "+.bhsr.com"
    - "+.juequling.com"
    - "+.miyoushe.com"
    - "+.mhyurl.cn"
    - "+.hoyoverse.com"
    - "+.hoyolab.com"
    - "+.genshinimpact.com"
    - "+.honkaistarrail.com"
    - "+.honkaiimpact3.com"
    - "+.zenlesszonezero.com"
    - "+.kurogame.com"
    - "+.kurogames.com"
    - "+.kurobbs.com"
    - "+.aki-game.com"
    - "+.aki-game2.com"
    - "+.kurogames-global.com"
    - "+.kurogame.xyz"
    - "+.wegame.com.cn"
    - game.163.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.miwifi.com"
    - "+.market.xiaomi.com"
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver: ["https://dns.alidns.com/dns-query", "https://doh.pub/dns-query"]

# ==================== 代理策略组 ====================
proxy-groups:
  # ===== 顶层策略 =====
  - name: Proxy
    <<: *BaseSelect
    proxies: [DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png

  # ===== 地区策略 =====
  - name: HK
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    filter: *FilterHK

  - name: TW
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    filter: *FilterTW

  - name: JP
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    filter: *FilterJP

  - name: SG
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    filter: *FilterSG

  - name: US
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    filter: *FilterUS

  - name: DE
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Germany.png
    filter: *FilterDE

  # ===== 专用策略 =====
  - name: Telegram
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    filter: *FilterTelegram

  - name: GlobalMedia
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Streaming.png
    filter: *FilterGlobalMedia

  - name: GlobalEmby
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png
    filter: *FilterGlobalEmby

  - name: RFCEmby
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/VIP.png
    filter: *FilterRFCEmby

  - name: AIGC
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
    filter: *FilterAIGC

  - name: Google
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png
    filter: *FilterGoogle

  - name: Speedtest
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Speedtest.png
    filter: *FilterSpeedtest

  - name: Download
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Download.png
    filter: *FilterHKJPWide

  - name: PayPal
    type: select
    proxies: [US, HK, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/PayPal.png

  - name: Crypto
    type: select
    proxies: [TW, Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Cryptocurrency.png


  - name: MSCDN
    type: select
    proxies: [DIRECT, Proxy]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png

  - name: MSSvc
    type: select
    proxies: [Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/OneDrive.png

  # ===== 顶层策略 =====
  - name: Sub1
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available_1.png

  - name: Final
    type: select
    proxies: [Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

# ==================== 规则路由 ====================
rules:
  # > 进程规则（macOS Stash 生效，iOS/tvOS 忽略）
  - PROCESS-NAME,Stash,DIRECT
  - PROCESS-NAME,v2ray,DIRECT
  - PROCESS-NAME,ss-local,DIRECT
  - PROCESS-NAME,UUBooster,DIRECT
  - PROCESS-NAME,aria2c,DIRECT
  - PROCESS-NAME,fdm,DIRECT
  - PROCESS-NAME,Folx,DIRECT
  - PROCESS-NAME,NetTransport,DIRECT
  - PROCESS-NAME,Thunder,DIRECT
  - PROCESS-NAME,Transmission,DIRECT
  - PROCESS-NAME,uTorrent,DIRECT
  - PROCESS-NAME,WebTorrent,DIRECT
  - PROCESS-NAME,WebTorrent Helper,DIRECT
  - PROCESS-NAME,aria2c.exe,DIRECT
  - PROCESS-NAME,fdm.exe,DIRECT
  - PROCESS-NAME,NetTransport.exe,DIRECT
  - PROCESS-NAME,Thunder.exe,DIRECT
  - PROCESS-NAME,Transmission.exe,DIRECT
  - PROCESS-NAME,uTorrent.exe,DIRECT
  - PROCESS-NAME,qbittorrent.exe,DIRECT
  - PROCESS-NAME,BitComet.exe,DIRECT
  - PROCESS-NAME,Nutstore,DIRECT
  - PROCESS-NAME,Nutstore.exe,DIRECT
  - PROCESS-NAME,iperf3-darwin,DIRECT
  # ===== 域名规则 start =====
  # > 国内游戏直连
  - DOMAIN-SUFFIX,kurogame.com,DIRECT
  - DOMAIN-SUFFIX,kurogames.com,DIRECT
  - DOMAIN-SUFFIX,kurobbs.com,DIRECT
  - DOMAIN-SUFFIX,aki-game.com,DIRECT
  - DOMAIN-SUFFIX,aki-game2.com,DIRECT
  - DOMAIN-SUFFIX,kurogames-global.com,DIRECT
  - DOMAIN-SUFFIX,kurogame.xyz,DIRECT
  # > 自定义直连补充
  - RULE-SET,direct_extra,DIRECT
  # > 测速网站
  - RULE-SET,speedtest_domain,Speedtest
  # > AIGC
  - RULE-SET,openai,AIGC
  - RULE-SET,ai,AIGC
  # > PayPal
  - RULE-SET,paypal_rule,PayPal
  # > Crypto
  - RULE-SET,crypto_rule,Crypto
  # > 流媒体（JP）
  - RULE-SET,stream_jp,JP
  # > 流媒体（TW）
  - RULE-SET,stream_tw,TW
  # > 流媒体（通用）
  - RULE-SET,stream,GlobalMedia
  # > Telegram 域名
  - RULE-SET,telegram,Telegram
  # > Apple
  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,apple,DIRECT
  # > Microsoft CDN
  - RULE-SET,microsoft_cdn,MSCDN
  # > Download
  - RULE-SET,download_domain,Download
  - RULE-SET,download_nonip,Download
  # > Microsoft
  - RULE-SET,microsoft,MSSvc
  # > Google 服务
  - RULE-SET,google,Google
  # > 国内常见域名
  - RULE-SET,domestic,DIRECT
  # > 常见直连规则
  - RULE-SET,direct,DIRECT
  # > 国内域名兜底
  - RULE-SET,cn_domain,DIRECT
  # > 国内游戏直连补充
  - DOMAIN,end-api.shallow.ink,DIRECT
  - DOMAIN,end.shallow.ink,DIRECT
  - DOMAIN-SUFFIX,tgpro.top,DIRECT
  - DOMAIN-SUFFIX,vrzwk.top,DIRECT
  # > 常见海外域名
  - RULE-SET,proxy_domain,Proxy
  - RULE-SET,global,Proxy
  # > 内网域名
  - RULE-SET,lan_nonip,DIRECT
  # > 非中国大陆域名兜底
  - RULE-SET,geolocation_not_cn,Proxy
  # ===== 域名规则 end =====
  # ===== IP 规则 start =====
  # > Telegram IP
  - RULE-SET,telegram_ip,Telegram,no-resolve
  # > 中国大陆 IP
  - RULE-SET,china_ip,DIRECT
  - RULE-SET,cn_ip,DIRECT
  # > LAN IP
  - RULE-SET,lan_ip,DIRECT
  # ===== IP 规则 end =====
  - GEOIP,CN,DIRECT
  # > Final
  - MATCH,Final

