# Stash Configuration — Mini（精简版，全 select 策略组）

# ==================== 锚点配置 ====================
BaseProvider: &BaseProvider
  type: http
  interval: 86400
  proxy: Proxy
  health-check:
    enable: true
    url: 'http://1.1.1.1/generate_204'
    interval: 300
    timeout: 5000
    lazy: true

BaseSelect: &BaseSelect {type: select, use: [Sub1]}

FilterHK: &FilterHK '(?=.*(?:🇭🇰|HK|Hong))'
FilterTW: &FilterTW '(?=.*(?:🇨🇳|TW|Tai))'
FilterJP: &FilterJP '(?=.*(?:🇯🇵|JP|Japan))'
FilterSG: &FilterSG '(?=.*(?:🇸🇬|SG|Sing))'
FilterUS: &FilterUS '(?=.*(?:🇺🇸|US|USA))'
FilterDE: &FilterDE '(?=.*(?:🇩🇪|DE|DEU))'

FilterOpt: &FilterOpt '^(?!.*(?:thru|@))'
FilterCDN: &FilterCDN '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterTelegram: &FilterTelegram '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterGlobalMedia: &FilterGlobalMedia '(?=.*(?:🇭🇰|🇨🇳|🇸🇬|HK|TW|SG|Hong|Tai|Sing))'
FilterAIGC: &FilterAIGC '(?=.*(?:🇨🇳|🇯🇵|🇸🇬|🇺🇸|🇬🇧|TW|JP|SG|US|英国))(?=.*(?:SoftBank|Nuro|Ucom|IIJ|Starlink|ATT|Hawaii|家宽))'

BehaviorCL: &BehaviorCL {type: http, behavior: classical, format: text, interval: 86400}

BehaviorIP: &BehaviorIP {type: http, behavior: classical, format: text, interval: 86400}

BehaviorMrsDN: &BehaviorMrsDN {type: http, behavior: domain, format: mrs, interval: 86400}

BehaviorMrsIP: &BehaviorMrsIP {type: http, behavior: ipcidr, format: mrs, interval: 86400}

# ==================== 代理提供者 ====================
proxy-providers:
  Sub1:
    <<: *BaseProvider
    url: '订阅地址'
    path: ./proxy_providers/sub1.yaml

# ==================== 核心配置 ====================
mode: rule
port: 7890
socks-port: 7891
mixed-port: 7893
ipv6: false
allow-lan: true
log-level: warning

# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443], override-destination: true}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# ==================== DNS 配置（精简：fake-ip + 基础 nameserver）====================
dns:
  enable: true
  skip-cert-verify: true
  use-system-hosts: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.localdomain"
    - "+.internal"
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "stun.*"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver: ["https://dns.alidns.com/dns-query", "https://doh.pub/dns-query"]

# ==================== 代理策略组 ====================
proxy-groups:
  - name: Proxy
    type: select
    proxies: [Opt, Core, CDN]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png

  - name: Opt
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png
    filter: *FilterOpt

  - name: Core
    type: select
    proxies: [HK, TW, JP]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Static.png

  - name: CDN
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png
    filter: *FilterCDN

  # ===== 地区策略 =====
  - name: HK
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    filter: *FilterHK

  - name: TW
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    filter: *FilterTW

  - name: JP
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    filter: *FilterJP

  - name: SG
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    filter: *FilterSG

  - name: US
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    filter: *FilterUS

  - name: DE
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Germany.png
    filter: *FilterDE

  # ===== 专用策略 =====
  - name: AIGC
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
    filter: *FilterAIGC

  - name: Telegram
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    filter: *FilterTelegram

  - name: GlobalMedia
    <<: *BaseSelect
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Streaming.png
    filter: *FilterGlobalMedia

  - name: Final
    type: select
    proxies: [Proxy, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

# ==================== 规则路由 ====================
rules:
  # ===== 域名规则 =====
  - RULE-SET,openai,AIGC
  - RULE-SET,ai,AIGC
  - RULE-SET,telegram,Telegram
  # > 自定义直连补充
  - RULE-SET,direct_extra,DIRECT
  - RULE-SET,youtube_rule,GlobalMedia
  - RULE-SET,stream,GlobalMedia
  # > 国内常见域名
  - RULE-SET,domestic,DIRECT
  # > 常见直连规则
  - RULE-SET,direct,DIRECT
  # > 国内域名兜底
  - RULE-SET,cn_domain,DIRECT
  # > 常见海外域名
  - RULE-SET,global,Proxy
  # > 内网域名
  - RULE-SET,lan_nonip,DIRECT
  # > 非中国大陆域名兜底
  - RULE-SET,geolocation_not_cn,Proxy
  # ===== IP 规则 =====
  - RULE-SET,telegram_ip,Telegram,no-resolve
  - RULE-SET,cn_ip,DIRECT
  - RULE-SET,lan_ip,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Final

# ==================== 规则集提供者 ====================
rule-providers:
  openai:
    <<: *BehaviorMrsDN
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs'
  ai:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/ai.txt'
  telegram:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/telegram.txt'
  stream:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/stream.txt'
  direct:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/direct.txt'
  global:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/global.txt'
  domestic:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/domestic.txt'
  lan_nonip:
    <<: *BehaviorCL
    url: 'https://ruleset.skk.moe/Clash/non_ip/lan.txt'
  telegram_ip:
    <<: *BehaviorIP
    url: 'https://ruleset.skk.moe/Clash/ip/telegram.txt'
  lan_ip:
    <<: *BehaviorIP
    url: 'https://ruleset.skk.moe/Clash/ip/lan.txt'
  direct_extra:
    <<: *BehaviorMrsDN
    url: 'https://raw.githubusercontent.com/AlexKris/rules/main/mihomo/non-ip/direct-extra.mrs'
  youtube_rule:
    <<: *BehaviorMrsDN
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs'
  cn_domain:
    <<: *BehaviorMrsDN
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs'
  geolocation_not_cn:
    <<: *BehaviorMrsDN
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs'
  cn_ip:
    <<: *BehaviorMrsIP
    url: 'https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs'
# ==================== EOF ====================
