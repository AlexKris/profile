# ==================== 锚点配置 ====================
BaseProvider: &BaseProvider
  type: http
  interval: 86400
  proxy: Proxy
  health-check:
    enable: true
    url: 'http://1.1.1.1/generate_204'
    interval: 300
    timeout: 5000
    lazy: true

BaseSelect: &BaseSelect {type: select}

FilterHK: &FilterHK '(?=.*(?:🇭🇰|HK|Hong))'
FilterTW: &FilterTW '(?=.*(?:🇨🇳|TW|Tai))'
FilterJP: &FilterJP '(?=.*(?:🇯🇵|JP|Japan))'
FilterSG: &FilterSG '(?=.*(?:🇸🇬|SG|Sing))'
FilterUS: &FilterUS '(?=.*(?:🇺🇸|US|USA))'
FilterDE: &FilterDE '(?=.*(?:🇩🇪|DE|DEU))'

FilterJP_All: &FilterJP_All '(?=.*(?:🇯🇵|JP|Japan))'

FilterOpt: &FilterOpt '^(?!.*(?:thru|@))'

FilterCDN: &FilterCDN '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterTelegram: &FilterTelegram '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterSocial: &FilterSocial '(?=.*(?:🇭🇰|🇯🇵|HK|JP|Hong|Japan))'
FilterGlobalMedia: &FilterGlobalMedia '(?=.*(?:🇭🇰|🇨🇳|🇸🇬|HK|TW|SG|Hong|Tai|Sing))'
FilterYouTube: &FilterYouTube '(?=.*(?:🇭🇰|🇨🇳|🇯🇵|🇸🇬|HK|TW|JP|SG))'
FilterGlobalEmby: &FilterGlobalEmby '(?=.*(?:🇭🇰|🇯🇵|🇸🇬|HK|JP|SG))'
FilterRFCEmby: &FilterRFCEmby '(?=.*(?:🇭🇰|🇯🇵|🇸🇬|HK|JP|SG))(?=.*(?:RFC|Jinx))'
FilterAIGC: &FilterAIGC '(?=.*(?:🇨🇳|🇯🇵|🇸🇬|🇺🇸|🇬🇧|TW|JP|SG|US|英国))(?=.*(?:SoftBank|Nuro|Ucom|IIJ|Starlink|ATT|Hawaii|家宽))'
FilterGoogle: &FilterGoogle '(?=.*(?:🇺🇸|US|USA))'
FilterSpeedtest: &FilterSpeedtest '(?=.*(?:🇭🇰|🇨🇳|🇯🇵|🇸🇬|HK|TW|JP|SG))'

BehaviorDN: &BehaviorDN {type: http, behavior: domain, format: text, interval: 86400}

BehaviorCL: &BehaviorCL {type: http, behavior: classical, format: text, interval: 86400}

BehaviorIP: &BehaviorIP {type: http, behavior: classical, format: text, interval: 86400}

BehaviorIPCIDRText: &BehaviorIPCIDRText {type: http, behavior: ipcidr, format: text, interval: 86400}

BehaviorMrsDN: &BehaviorMrsDN {type: http, behavior: domain, format: mrs, interval: 86400}

BehaviorMrsIP: &BehaviorMrsIP {type: http, behavior: ipcidr, format: mrs, interval: 86400}

# ==================== 代理提供者 ====================
proxy-providers:
  Sub1:
    <<: *BaseProvider
    url: '订阅地址'
    path: ./proxy_providers/sub1.yaml

# ==================== 核心配置 ====================
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
keep-alive-interval: 15
keep-alive-idle: 600

external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: ''

profile: {store-selected: true, store-fake-ip: true}

# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP: {ports: [80, 8080-8880]}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# ==================== TUN 模式 ====================
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  # auto-redirect: true  # 仅 Linux 支持，macOS 无效
  auto-detect-interface: true

# ==================== DNS 配置 ====================
dns:
  enable: true
  use-system-hosts: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.m2m"
    - injections.adguard.org
    - local.adguard.org
    - "+.bogon"
    - "+.local"
    - "+.lan"
    - "+.internal"
    - "+.localdomain"
    - home.arpa
    - 127.0.0.1.sslip.io
    - 127.atlas.skk.moe
    - dns.msftncsi.com
    - "*.srv.nintendo.net"
    - "*.stun.playstation.net"
    - xbox.*.microsoft.com
    - "*.turn.twilio.com"
    - "*.stun.twilio.com"
    - stun.syncthing.net
    - "stun.*"
    - lancache.steamcontent.com
    - "+.ea.com"
    - "+.eaassets-a.akamaihd.net"
    - "+.battle.net"
    - "+.battlenet.com"
    - "+.battlenet.com.cn"
    - "+.blizzard.com"
    - "+.blzstatic.cn"
    - "+.steamserver.net"
    - "+.steampowered.com"
    - "+.steamcontent.com"
    - "+.xboxlive.com"
    - stun.l.google.com
    - "+.mihoyo.com"
    - "+.yuanshen.com"
    - "+.bh3.com"
    - "+.bhsr.com"
    - "+.juequling.com"
    - "+.miyoushe.com"
    - "+.mhyurl.cn"
    - "+.hoyoverse.com"
    - "+.hoyolab.com"
    - "+.genshinimpact.com"
    - "+.honkaistarrail.com"
    - "+.honkaiimpact3.com"
    - "+.zenlesszonezero.com"
    - "+.kurogame.com"
    - "+.kurogames.com"
    - "+.kurobbs.com"
    - "+.aki-game.com"
    - "+.aki-game2.com"
    - "+.kurogames-global.com"
    - "+.kurogame.xyz"
    - "+.wegame.com.cn"
    - game.163.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.miwifi.com"
    - "+.market.xiaomi.com"
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver: ["https://dns.alidns.com/dns-query", "https://doh.pub/dns-query"]

# ==================== 代理策略组 ====================
proxy-groups:
  # ===== 顶层策略 =====
  - name: Proxy
    <<: *BaseSelect
    proxies: [Opt, Core, CDN]

  # ===== 二级策略 =====
  - name: Opt
    <<: *BaseSelect
    use: [Sub1]
    filter: *FilterOpt

  - name: Core
    <<: *BaseSelect
    proxies: [HK, TW, JP]

  - name: CDN
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterCDN

  # ===== 地区策略=====
  - name: HK
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterHK

  - name: TW
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterTW

  - name: JP
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterJP

  - name: SG
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterSG

  - name: US
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterUS

  - name: DE
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterDE

  # ===== 专用策略 =====
  - name: Telegram
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterTelegram

  - name: SocialMedia
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterSocial

  - name: GlobalMedia
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterGlobalMedia

  - name: YouTube
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterYouTube

  - name: GlobalEmby
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterGlobalEmby

  - name: RFCEmby
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterRFCEmby

  - name: AIGC
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterAIGC

  - name: Google
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterGoogle

  - name: Speedtest
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterSpeedtest

  - name: Download
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterCDN

  - name: Gaming
    <<: *BaseSelect
    include-all-providers: true
    filter: *FilterCDN

  - name: AppleCDN
    <<: *BaseSelect
    proxies: [DIRECT, Proxy]

  - name: AppleSvc
    <<: *BaseSelect
    proxies: [DIRECT, Proxy]

  - name: MSCDN
    <<: *BaseSelect
    proxies: [DIRECT, Proxy]

  - name: MSSvc
    <<: *BaseSelect
    proxies: [Proxy, DIRECT]

  # ===== 顶层策略 =====
  - name: Final
    <<: *BaseSelect
    proxies: [Proxy, DIRECT]

# ==================== 规则路由 ====================
rules:
  # ===== 域名规则 start =====
  # > Other
  - DOMAIN-KEYWORD,hanime,CDN

  # > 国内游戏直连
  - DOMAIN-SUFFIX,kurogame.com,DIRECT
  - DOMAIN-SUFFIX,kurogames.com,DIRECT
  - DOMAIN-SUFFIX,kurobbs.com,DIRECT
  - DOMAIN-SUFFIX,aki-game.com,DIRECT
  - DOMAIN-SUFFIX,aki-game2.com,DIRECT
  - DOMAIN-SUFFIX,kurogames-global.com,DIRECT
  - DOMAIN-SUFFIX,kurogame.xyz,DIRECT

  # > 自定义直连补充
  - RULE-SET,direct_extra,DIRECT

  # > 测速网站
  - RULE-SET,speedtest_domain,Speedtest

  # > 静态 CDN 域名
  - RULE-SET,cdn_domain,CDN
  - RULE-SET,cdn_nonip,CDN

  # > AIGC
  - RULE-SET,openai,AIGC
  - RULE-SET,ai,AIGC

  # > YouTube
  - RULE-SET,youtube_rule,YouTube

  # > 流媒体（JP）
  - RULE-SET,stream_jp,JP

  # > 流媒体（TW）
  - RULE-SET,stream_tw,TW

  # > 流媒体（通用）
  - RULE-SET,stream,GlobalMedia

  # > Telegram 域名
  - RULE-SET,telegram,Telegram

  # > 社交媒体（X / Instagram）
  - RULE-SET,social_twitter,SocialMedia
  - RULE-SET,social_instagram,SocialMedia

  # > Apple CDN
  - RULE-SET,apple_cdn_domain,AppleCDN
  - RULE-SET,apple_cdn_nonip,AppleCDN

  # > Microsoft CDN
  - RULE-SET,microsoft_cdn,MSCDN

  # > Download
  - RULE-SET,download_domain,Download
  - RULE-SET,download_nonip,Download

  # > Apple CN
  - RULE-SET,apple_cn,DIRECT

  # > Apple / Microsoft
  - RULE-SET,apple_services,AppleSvc
  - RULE-SET,microsoft,MSSvc

  # > Google 服务
  - RULE-SET,google,Google

  # > 国内常见域名
  - RULE-SET,domestic,DIRECT

  # > 常见直连规则
  - RULE-SET,direct,DIRECT

  # > 国内域名兜底
  - RULE-SET,cn_domain,DIRECT

  # > 国内游戏直连补充
  - DOMAIN,end-api.shallow.ink,DIRECT
  - DOMAIN,end.shallow.ink,DIRECT
  - DOMAIN-SUFFIX,tgpro.top,DIRECT
  - DOMAIN-SUFFIX,vrzwk.top,DIRECT

  # > 海外游戏
  - RULE-SET,games,Gaming

  # > 常见海外域名
  - RULE-SET,global,Proxy

  # > 内网域名
  - RULE-SET,lan_nonip,DIRECT

  # > 非中国大陆域名兜底
  - RULE-SET,geolocation_not_cn,Proxy

  # ===== 域名规则 end =====

  # ===== IP 规则 start =====
  # > Telegram IP
  - RULE-SET,telegram_ip,Telegram,no-resolve

  # > 中国大陆 IP
  - RULE-SET,domestic_ip,DIRECT
  - RULE-SET,china_ip,DIRECT
  - RULE-SET,cn_ip,DIRECT

  # > LAN IP
  - RULE-SET,lan_ip,DIRECT

  # ===== IP 规则 end =====

  - GEOIP,CN,DIRECT

  # > Final
  - MATCH,Final

